<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>SQ50K · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001C;
  --red-dim: rgba(232,0,28,0.15);
  --red-mid: rgba(232,0,28,0.35);
  --black: #000000;
  --surface: #0d0d0d;
  --surface2: #161616;
  --surface3: #1f1f1f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --white: #ffffff;
  --white70: rgba(255,255,255,0.7);
  --white40: rgba(255,255,255,0.4);
  --white20: rgba(255,255,255,0.2);
  --white10: rgba(255,255,255,0.1);
  --p1: #E8001C;
  --p2: #ff6b35;
  --p3: #ffaa00;
  --p4: #cc44ff;
  --recovery: rgba(255,255,255,0.25);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  overscroll-behavior: none;
}

/* ── APP SHELL ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  background: var(--black);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 12px) 16px 0;
  z-index: 50;
}
.topbar-inner {
  padding-bottom: 10px;
}
.topbar-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 2px;
}
.topbar-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.topbar-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  letter-spacing: 0.01em;
  text-transform: uppercase;
}
.topbar-title em {
  color: var(--red);
  font-style: normal;
}
.race-countdown {
  text-align: right;
}
.countdown-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--red);
  line-height: 1;
}
.countdown-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white40);
  margin-top: 1px;
}

/* ── GOALS STRIP ── */
.goals-strip {
  flex-shrink: 0;
  display: flex;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.goal-item {
  flex: 1;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-right: 1px solid var(--border);
}
.goal-item:last-child { border-right: none; }
.goal-grade {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.goal-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--white);
}
.goal-a .goal-grade { color: var(--red); }
.goal-b .goal-grade { color: var(--white40); }
.goal-c .goal-grade { color: var(--white20); }

/* ── WEEK NAV ── */
.week-nav {
  flex-shrink: 0;
  background: var(--black);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px 8px;
}
.week-nav-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.week-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white40);
}
.week-phase-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}
.week-dates {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  color: var(--white40);
  letter-spacing: 0.05em;
}
.week-stats-row {
  display: flex;
  gap: 16px;
}
.wstat {
  display: flex;
  flex-direction: column;
}
.wstat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 800;
  line-height: 1;
  color: var(--white);
}
.wstat-lbl {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white40);
  margin-top: 1px;
}

/* ── PROGRESS BAR ── */
.progress-track {
  flex-shrink: 0;
  height: 3px;
  background: var(--surface3);
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--red);
  transition: width 0.3s ease;
}

/* ── DAY DOTS (mini week view) ── */
.day-dots {
  flex-shrink: 0;
  display: flex;
  padding: 8px 16px;
  gap: 6px;
  background: var(--black);
  border-bottom: 1px solid var(--border);
}
.day-dot-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 4px 2px;
  border-radius: 6px;
  transition: background 0.12s;
}
.day-dot-item:active { background: var(--white10); }
.day-dot-item.active-day .dot { background: var(--red); }
.day-dot-item.active-day .dot-label { color: var(--red); }
.dot-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white40);
}
.dot-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--white70);
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--surface3);
  transition: background 0.12s;
}
.dot.has-session { background: var(--white20); }
.dot.is-rest { background: var(--surface3); }
.dot.is-today { background: var(--red); box-shadow: 0 0 6px var(--red); }
.dot.is-race { background: var(--red); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(env(safe-area-inset-bottom, 16px) + 16px);
  overscroll-behavior-y: contain;
}

/* ── DAY CARDS ── */
.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.day-card.rest { opacity: 0.45; }
.day-card.race-day {
  border-color: var(--red);
  background: rgba(232,0,28,0.06);
}
.day-card.expanded { border-color: var(--border2); }

.day-card-header {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.day-card.rest .day-card-header { cursor: default; }

.day-left {
  flex-shrink: 0;
  width: 42px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.day-name-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white40);
}
.day-num-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  line-height: 1;
  color: var(--white);
}
.day-num-lbl.today { color: var(--red); }

.day-accent-bar {
  flex-shrink: 0;
  width: 3px;
  height: 38px;
  border-radius: 2px;
  background: var(--surface3);
}

.day-mid { flex: 1; min-width: 0; }
.day-session-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 4px;
}
.day-chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.chip {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
}
.chip-km { background: var(--white10); color: var(--white70); }
.chip-vert { background: var(--red-dim); color: var(--red); }

.day-chevron {
  flex-shrink: 0;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  color: var(--white20);
  transition: transform 0.2s, color 0.15s;
  font-size: 12px;
}
.day-card.expanded .day-chevron { transform: rotate(180deg); color: var(--white40); }
.day-card.rest .day-chevron { display: none; }

/* ── EXPANDED DETAIL ── */
.day-detail {
  display: none;
  padding: 0 14px 14px 14px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.day-card.expanded .day-detail { display: block; }
.detail-text {
  font-size: 13px;
  font-weight: 300;
  color: var(--white70);
  line-height: 1.65;
  padding-top: 12px;
}
.detail-text strong {
  color: var(--white);
  font-weight: 500;
}

/* Race day special */
.race-card-inner {
  padding: 14px;
}
.race-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--red);
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 3px;
  margin-bottom: 10px;
}
.race-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 10px;
}
.race-cutoffs {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.cutoff-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.cutoff-label { color: var(--white40); }
.cutoff-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--white); }
.race-goals-row {
  display: flex;
  gap: 6px;
}
.race-goal-chip {
  flex: 1;
  padding: 6px 8px;
  border-radius: 6px;
  text-align: center;
}
.race-goal-chip .rg-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 2px;
}
.race-goal-chip .rg-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 800;
}
.rg-a { background: var(--red-dim); border: 1px solid var(--red-mid); }
.rg-a .rg-label { color: var(--red); }
.rg-b { background: var(--white10); border: 1px solid var(--border2); }
.rg-b .rg-label { color: var(--white40); }
.rg-c { background: var(--surface3); border: 1px solid var(--border); }
.rg-c .rg-label { color: var(--white20); }

/* ── SWIPE INDICATOR ── */
.swipe-hint {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--white20);
  pointer-events: none;
  opacity: 1;
  transition: opacity 1s;
}
.swipe-hint.hidden { opacity: 0; }

/* ── MONTH VIEW OVERLAY ── */
.month-overlay {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  padding-top: env(safe-area-inset-top, 0px);
}
.month-overlay.open { transform: translateY(0); }

.month-overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.month-overlay-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.close-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.month-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(env(safe-area-inset-bottom,16px) + 12px);
}

.month-block {
  margin-bottom: 24px;
}
.month-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 8px;
}
.month-grid-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.mgh-cell {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  color: var(--white20);
  padding: 2px 0;
}
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.m-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  border: 1px solid transparent;
}
.m-cell:active { background: var(--white10); }
.m-cell.empty { cursor: default; }
.m-cell.current-week { background: var(--surface2); border-color: var(--border); }
.m-cell.today { border-color: var(--red); }
.m-cell.is-race { background: var(--red-dim); border-color: var(--red); }
.m-cell.recovery-week { opacity: 0.6; }
.m-cell-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--white70);
  line-height: 1;
}
.m-cell.empty .m-cell-num { color: var(--white20); }
.m-cell.today .m-cell-num { color: var(--red); }
.m-cell.is-race .m-cell-num { color: var(--red); }
.m-cell-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  margin-top: 2px;
}

/* ── PHASE COLOURS ── */
.ph1 { --pc: var(--p1); }
.ph2 { --pc: var(--p2); }
.ph3 { --pc: var(--p3); }
.ph4 { --pc: var(--p4); }

/* ── SWIPE ANIMATION ── */
.scroll-area {
  position: relative;
}
.week-view {
  will-change: transform;
  transition: none;
}
.week-view.sliding-left {
  animation: slideLeft 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
.week-view.sliding-right {
  animation: slideRight 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes slideLeft {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(-40px); opacity: 0; }
}
@keyframes slideRight {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(40px); opacity: 0; }
}
.week-view.entering-left {
  animation: enterLeft 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
.week-view.entering-right {
  animation: enterRight 0.25s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes enterLeft {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes enterRight {
  from { transform: translateX(-40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Phase badge colours */
.badge-base { background: rgba(232,0,28,0.18); color: var(--red); }
.badge-build { background: rgba(255,107,53,0.18); color: #ff6b35; }
.badge-peak { background: rgba(255,170,0,0.18); color: #ffaa00; }
.badge-recovery { background: rgba(255,255,255,0.08); color: var(--white40); }
.badge-sharpen { background: rgba(204,68,255,0.18); color: #cc44ff; }
.badge-taper { background: rgba(204,68,255,0.12); color: rgba(204,68,255,0.7); }
.badge-race { background: var(--red); color: white; }

/* Accent bar colours per phase */
.acc-p1 { background: var(--p1); }
.acc-p2 { background: var(--p2); }
.acc-p3 { background: var(--p3); }
.acc-p4 { background: var(--p4); }
.acc-rest { background: var(--surface3); }
.acc-race { background: var(--red); }

</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-eyebrow">Squamish · Aug 16 · 2026</div>
      <div class="topbar-row">
        <div class="topbar-title">SQ<em>50K</em><br>PLAN</div>
        <div class="race-countdown">
          <div class="countdown-num" id="countdown-num">—</div>
          <div class="countdown-label">days to race</div>
        </div>
      </div>
    </div>
  </div>

  <!-- GOALS -->
  <div class="goals-strip">
    <div class="goal-item goal-a">
      <div class="goal-grade">A</div>
      <div class="goal-time">6:45</div>
    </div>
    <div class="goal-item goal-b">
      <div class="goal-grade">B</div>
      <div class="goal-time">7:15</div>
    </div>
    <div class="goal-item goal-c">
      <div class="goal-grade">C</div>
      <div class="goal-time">8:00</div>
    </div>
    <div class="goal-item" style="cursor:pointer;" onclick="openMonth()">
      <div class="goal-grade" style="color:var(--white40);">CAL</div>
      <div class="goal-time" style="font-size:13px; color:var(--white40);">▦ View</div>
    </div>
  </div>

  <!-- WEEK NAV -->
  <div class="week-nav">
    <div class="week-nav-top">
      <div class="week-id" id="week-id-label">WEEK 1 OF 18</div>
      <div class="week-phase-badge" id="week-phase-badge">Base</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="week-dates" id="week-dates-label">Apr 6 – Apr 12</div>
      <div class="week-stats-row">
        <div class="wstat">
          <div class="wstat-val" id="wstat-km">—</div>
          <div class="wstat-lbl">km</div>
        </div>
        <div class="wstat">
          <div class="wstat-val" id="wstat-vert">—</div>
          <div class="wstat-lbl">vert (m)</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- DAY DOTS -->
  <div class="day-dots" id="day-dots"></div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">
    <div class="week-view" id="week-view"></div>
  </div>

  <!-- SWIPE HINT -->
  <div class="swipe-hint" id="swipe-hint">← swipe to change week →</div>

</div>

<!-- MONTH OVERLAY -->
<div class="month-overlay" id="month-overlay">
  <div class="month-overlay-header">
    <div class="month-overlay-title">Full Calendar</div>
    <button class="close-btn" onclick="closeMonth()">Close</button>
  </div>
  <div class="month-scroll" id="month-scroll"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const PLAN = [
  { week:1, phase:1, tag:'Base', km:35, vert:800, days:[
    { d:'Mon', summary:'Rest or easy walk', detail:'Full rest or 30 min easy walk. Set up training log, check gear.', km:0, vert:0 },
    { d:'Tue', summary:'Easy trail + strides', detail:'8km easy trail at conversational pace. 6×20sec strides at the end. 200m vert. Focus on relaxed form.', km:8, vert:200 },

const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const START_DATE = new Date(2026, 3, 6); // Apr 6 2026
const RACE_DATE  = new Date(2026, 7, 16); // Aug 16 2026

function getDate(weekIdx, dayIdx) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + weekIdx * 7 + dayIdx);
  return d;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function daysUntilRace() {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.round((RACE_DATE - now) / 86400000));
}
function findCurrentWeek() {
  const now = new Date(); now.setHours(0,0,0,0);
  if (now < START_DATE) return 0;
  const diff = Math.floor((now - START_DATE) / 86400000);
  return Math.min(Math.floor(diff / 7), PLAN.length - 1);
}

// ── STATE ──
let currentWeek = findCurrentWeek();
let swipeHintShown = false;

// ── COUNTDOWN ──
document.getElementById('countdown-num').textContent = daysUntilRace();

// ── HIDE SWIPE HINT ──
setTimeout(() => {
  const hint = document.getElementById('swipe-hint');

// ── PHASE HELPERS ──
function phaseBadgeClass(tag) {
  const map = { Base:'badge-base', Build:'badge-build', Peak:'badge-peak', Recovery:'badge-recovery', Sharpen:'badge-sharpen', Taper:'badge-taper', Race:'badge-race' };
  return map[tag] || 'badge-base';
}
function accentClass(phase, isRace) {
  if (isRace) return 'acc-race';
  return ['','acc-p1','acc-p2','acc-p3','acc-p4'][phase] || 'acc-rest';
}
function phaseLabel(phase, tag) {
  const phases = { 1:'Phase 1 · Base', 2:'Phase 2 · Vert', 3:'Phase 3 · Peak', 4:'Phase 4 · Taper' };
  return tag === 'Race' ? '🏁 Race Week' : (phases[phase] || '');
}
function formatMonthDay(d) {
  return d.toLocaleString('en-CA', { month:'short', day:'numeric' });
}

// ── RENDER WEEK ──
function renderWeek(weekIdx, direction) {
  const wv = document.getElementById('week-view');
  const week = PLAN[weekIdx];

  // Update header
  const d0 = getDate(weekIdx, 0);
  const d6 = getDate(weekIdx, 6);
  document.getElementById('week-id-label').textContent = `WEEK ${week.week} OF 18`;
  const badge = document.getElementById('week-phase-badge');
  badge.className = 'week-phase-badge ' + phaseBadgeClass(week.tag);
  badge.textContent = week.tag;
  document.getElementById('week-dates-label').textContent = `${formatMonthDay(d0)} – ${formatMonthDay(d6)}`;
  document.getElementById('wstat-km').textContent = week.km;
  document.getElementById('wstat-vert').textContent = week.vert.toLocaleString();
  document.getElementById('progress-fill').style.width = `${((weekIdx + 1) / PLAN.length * 100).toFixed(1)}%`;

  // Dots
  const dots = document.getElementById('day-dots');
  dots.innerHTML = '';
  week.days.forEach((day, di) => {
    const date = getDate(weekIdx, di);
    const today = isToday(date);
    const item = document.createElement('div');
    item.className = 'day-dot-item' + (di === 0 && today ? ' active-day' : today ? ' active-day' : '');
    let dotClass = 'dot';
    if (day.isRace) dotClass += ' is-race';
    else if (today) dotClass += ' is-today';
    else if (day.km > 0) dotClass += ' has-session';
    else dotClass += ' is-rest';
    item.innerHTML = `<div class="dot-label">${day.d}</div><div class="dot-date">${date.getDate()}</div><div class="${dotClass}"></div>`;
    item.addEventListener('click', () => {
      const cards = wv.querySelectorAll('.day-card');
      if (cards[di]) {
        cards[di].scrollIntoView({ behavior:'smooth', block:'nearest' });
        if (day.km > 0 && !day.isRace) {
          setTimeout(() => cards[di].classList.add('expanded'), 200);
        }
      }
    });
    dots.appendChild(item);
  });

  // Animate out
  if (direction) {
    wv.classList.remove('sliding-left','sliding-right','entering-left','entering-right');
    wv.classList.add(direction === 'left' ? 'sliding-left' : 'sliding-right');
    setTimeout(() => {
      wv.classList.remove('sliding-left','sliding-right');
      buildWeekCards(wv, week, weekIdx);
      wv.classList.add(direction === 'left' ? 'entering-left' : 'entering-right');
      document.getElementById('scroll-area').scrollTop = 0;
      setTimeout(() => wv.classList.remove('entering-left','entering-right'), 300);
    }, 200);
  } else {
    buildWeekCards(wv, week, weekIdx);
    document.getElementById('scroll-area').scrollTop = 0;
  }
}

function buildWeekCards(container, week, weekIdx) {
  container.innerHTML = '';
  week.days.forEach((day, di) => {
    const date = getDate(weekIdx, di);
    const today = isToday(date);
    const isRest = day.km === 0 && !day.isRace;

    const card = document.createElement('div');
    let cardClass = 'day-card';
    if (isRest) cardClass += ' rest';
    if (day.isRace) cardClass += ' race-day expanded';
    card.className = cardClass;

    if (day.isRace) {
      card.innerHTML = `
        <div class="race-card-inner">
          <div class="race-badge">Race Day</div>
          <div class="race-title">Squamish<br>50 KM</div>
          <div style="font-size:12px; color:var(--white40); margin-bottom:10px;">Sunday Aug 16 · 6:15am start · Alice Lake</div>
          <div class="race-cutoffs">
            <div class="cutoff-row"><span class="cutoff-label">AS3 — 24.4km</span><span class="cutoff-val">By 12:00pm</span></div>
            <div class="cutoff-row"><span class="cutoff-label">AS4 — 34.2km</span><span class="cutoff-val">By 2:30pm</span></div>
            <div class="cutoff-row"><span class="cutoff-label">AS5 — 41.5km</span><span class="cutoff-val">By 3:30pm</span></div>
            <div class="cutoff-row"><span class="cutoff-label">Finish — 51.8km</span><span class="cutoff-val">By 5:45pm</span></div>
          </div>
          <div class="race-goals-row">
            <div class="race-goal-chip rg-a"><span class="rg-label">A Goal</span><span class="rg-time">Sub 6:45</span></div>
            <div class="race-goal-chip rg-b"><span class="rg-label">B Goal</span><span class="rg-time">6:45–7:15</span></div>
            <div class="race-goal-chip rg-c"><span class="rg-label">C Goal</span><span class="rg-time">Sub 8:00</span></div>
          </div>
        </div>`;
    } else {
      const accCls = isRest ? 'acc-rest' : accentClass(week.phase, false);
      const chipsHTML = (day.km > 0 || day.vert > 0) ? `
        <div class="day-chips">
          ${day.km > 0 ? `<span class="chip chip-km">${day.km}km</span>` : ''}
          ${day.vert > 0 ? `<span class="chip chip-vert">${day.vert.toLocaleString()}m↑</span>` : ''}
        </div>` : '';
      card.innerHTML = `
        <div class="day-card-header">
          <div class="day-left">
            <div class="day-name-lbl">${day.d}</div>
            <div class="day-num-lbl${today ? ' today' : ''}">${date.getDate()}</div>
          </div>
          <div class="day-accent-bar ${accCls}"></div>
          <div class="day-mid">
            <div class="day-session-title">${day.summary}</div>
            ${chipsHTML}
          </div>
          ${!isRest ? '<div class="day-chevron">▾</div>' : ''}
        </div>
        ${!isRest ? `<div class="day-detail"><div class="detail-text">${day.detail.replace(/\n/g, '<br>')}</div></div>` : ''}`;

      if (!isRest) {
        card.querySelector('.day-card-header').addEventListener('click', () => {
          card.classList.toggle('expanded');
        });
      }
    }
    container.appendChild(card);
  });
}

// ── SWIPE ──
let touchStartX = 0, touchStartY = 0, isSwiping = false;
const scrollArea = document.getElementById('scroll-area');

scrollArea.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isSwiping = false;
}, { passive: true });

scrollArea.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
    isSwiping = true;
  }
}, { passive: true });

scrollArea.addEventListener('touchend', e => {
  if (!isSwiping) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0 && currentWeek < PLAN.length - 1) {
      currentWeek++;
      renderWeek(currentWeek, 'left');
    } else if (dx > 0 && currentWeek > 0) {
      currentWeek--;
      renderWeek(currentWeek, 'right');
    }
  }
  isSwiping = false;
});

// ── MONTH OVERLAY ──
function openMonth() {
  buildMonthView();
  document.getElementById('month-overlay').classList.add('open');
}
function closeMonth() {
  document.getElementById('month-overlay').classList.remove('open');
}

function buildMonthView() {
  const container = document.getElementById('month-scroll');
  container.innerHTML = '';

  // Build a map of date → week/day info
  const dateMap = {};
  PLAN.forEach((week, wi) => {
    week.days.forEach((day, di) => {
      const d = getDate(wi, di);
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      dateMap[key] = { week, day, weekIdx: wi };
    });
  });

  // Group by month
  const months = {};
  PLAN.forEach((week, wi) => {
    week.days.forEach((day, di) => {
      const d = getDate(wi, di);
      const mk = `${d.getFullYear()}-${d.getMonth()}`;
      if (!months[mk]) months[mk] = { year: d.getFullYear(), month: d.getMonth(), dates: [] };
      months[mk].dates.push({ d, week, day, weekIdx: wi });
    });
  });

  Object.values(months).forEach(({ year, month, dates }) => {
    const block = document.createElement('div');
    block.className = 'month-block';

    const mn = new Date(year, month, 1).toLocaleString('en-CA', { month:'long', year:'numeric' });
    block.innerHTML = `
      <div class="month-name">${mn}</div>
      <div class="month-grid-header">
        ${['M','T','W','T','F','S','S'].map(d => `<div class="mgh-cell">${d}</div>`).join('')}
      </div>`;

    const grid = document.createElement('div');
    grid.className = 'month-grid';

    // Find first day of month, align to Mon=0
    const firstDay = new Date(year, month, 1);
    let startOffset = (firstDay.getDay() + 6) % 7; // Mon=0

    // Empty cells before
    for (let i = 0; i < startOffset; i++) {
      const empty = document.createElement('div');
      empty.className = 'm-cell empty';
      empty.innerHTML = '<div class="m-cell-num" style="color:transparent">0</div>';
      grid.appendChild(empty);
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const key = `${year}-${month}-${d}`;
      const info = dateMap[key];
      const today = isToday(date);

      const cell = document.createElement('div');
      let cellClass = 'm-cell';
      if (!info) cellClass += ' empty';
      if (today) cellClass += ' today';
      if (info?.day?.isRace) cellClass += ' is-race';
      if (info?.weekIdx === currentWeek) cellClass += ' current-week';
      if (info?.week?.tag === 'Recovery') cellClass += ' recovery-week';
      cell.className = cellClass;

      let dotColor = 'transparent';
      if (info) {
        const phColors = { 1:'var(--p1)', 2:'var(--p2)', 3:'var(--p3)', 4:'var(--p4)' };
        dotColor = info.day.km > 0 ? (phColors[info.week.phase] || 'var(--white20)') : 'var(--surface3)';
        if (info.day.isRace) dotColor = 'var(--red)';
      }

      cell.innerHTML = `<div class="m-cell-num">${d}</div><div class="m-cell-dot" style="background:${dotColor}"></div>`;

      if (info) {
        cell.addEventListener('click', () => {
          currentWeek = info.weekIdx;
          closeMonth();
          setTimeout(() => renderWeek(currentWeek), 50);
        });
      }
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    container.appendChild(block);
  });
}

// ── INIT ──
renderWeek(currentWeek);
</script>
